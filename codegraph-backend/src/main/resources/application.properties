spring.datasource.url=jdbc:postgresql://localhost:5432/ai_saas_db
spring.datasource.username=saas_user
spring.datasource.password=saas_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=never
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

hf.token=${HF_TOKEN}
groq.api.key=${GROQ_API_KEY}


# Retrieval configuration (restoring original safe defaults)
retrieval.similarity.threshold=0.8
retrieval.initial.limit=5
retrieval.final.limit=3